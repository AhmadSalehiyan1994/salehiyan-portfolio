<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Portfolio logo">
  <defs>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="55%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <radialGradient id="bg" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    <clipPath id="avatarClip">
      <circle cx="128" cy="128" r="96"/>
    </clipPath>
  </defs>

  <circle cx="128" cy="128" r="126" fill="url(#bg)"/>
  <circle cx="128" cy="128" r="123" fill="none" stroke="#0b1228" stroke-width="6"/>
  <circle cx="128" cy="128" r="117" fill="none" stroke="url(#ring)" stroke-width="10"/>

  <g clip-path="url(#avatarClip)">
    <image href="/images/first.png" x="18" y="-6" width="230" height="258" preserveAspectRatio="xMidYMin slice" transform="translate(256 0) scale(-1 1)"/>
  </g>

  <circle cx="128" cy="128" r="96" fill="none" stroke="#f1f5f9" stroke-opacity="0.18" stroke-width="2"/>
</svg>
